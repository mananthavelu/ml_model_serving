name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10.12] # Using a specific, stable Python version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4 # Keep v4 for now, v5 requires a new key syntax for pip cache, let's keep it simple
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run linting with Flake8
        run: |
          pip install flake8 # Ensure flake8 is available
          flake8 src/ scripts/ tests/

      - name: Run type checking with MyPy
        run: |
          pip install mypy # Ensure mypy is available
          mypy src/ scripts/

      - name: Run tests
        run: |
          python -m pip install --upgrade pytest || true
          PYTHONPATH=$GITHUB_WORKSPACE pytest tests/ -v

      - name: Build Docker image
        run: docker build -t ml_model_serving_api:latest -f ./deployment/docker/Dockerfile .
