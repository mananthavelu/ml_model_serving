name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        python-version: [3.10.12] # Using a specific, stable Python version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4 # Keep v4 for now, v5 requires a new key syntax for pip cache, let's keep it simple
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run linting with Flake8
        run: |
          pip install flake8 # Ensure flake8 is available
          flake8 src/ scripts/ tests/

      - name: Run type checking with MyPy
        run: |
          pip install mypy # Ensure mypy is available
          mypy src/ scripts/

      - name: Run tests
        run: |
          python -m pip install --upgrade pytest || true
          PYTHONPATH=$GITHUB_WORKSPACE pytest tests/ -v

      - name: Build Docker image
        run: docker build -t ml_model_serving_api:latest -f ./deployment/docker/Dockerfile .

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and Push Docker image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository }}/ml_model_serving_api
          # Strip "v" prefix from tag name
          VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,' -e 's,^v,,')
          # Use Docker `latest` tag convention
          [ "$VERSION" == "main" ] && VERSION=latest
          echo "IMAGE_ID=$IMAGE_ID"
          echo "VERSION=$VERSION"
          docker tag ml_model_serving_api:latest $IMAGE_ID:$VERSION
          docker push $IMAGE_ID:$VERSION
